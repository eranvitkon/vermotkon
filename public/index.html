<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ורמוטקון 🍸</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; min-height: 100vh; direction: rtl; }
  .header { background: #002288; padding: 20px 16px 14px; text-align: center; }
  .header h1 { color: #fff; font-size: 26px; font-weight: 600; letter-spacing: 2px; }
  .header p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 4px; }
  .stripe { height: 6px; background: repeating-linear-gradient(to right, #002288 0, #002288 33%, #fff 33%, #fff 66%, #002288 66%, #002288 100%); }
  .section { padding: 14px 12px; }
  .name-card { background: #002288; border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .name-label { font-size: 11px; color: rgba(255,255,255,0.7); margin-bottom: 5px; }
  .name-val { font-size: 22px; font-weight: 600; color: #fff; min-height: 32px; }
  .spin-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 10px 16px; border-radius: 12px; font-size: 15px; cursor: pointer; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .spin-btn:active { background: rgba(255,255,255,0.4); }
  .hint { font-size: 11px; color: #999; text-align: center; margin-bottom: 4px; }
  .cocktails-title { font-size: 13px; color: #666; margin-bottom: 10px; font-weight: 500; }
  .cgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .cc { background: #fff; border: 1.5px solid #002288; border-radius: 16px; padding: 12px 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
  .cc:active { transform: scale(0.96); }
  .cc.sel { background: #002288; }
  .cc.sel .cn { color: #fff; }
  .cc.sel .cd { color: rgba(255,255,255,0.75); }
  .cem { font-size: 26px; margin-bottom: 5px; }
  .cn { font-size: 13px; font-weight: 600; color: #002288; margin-bottom: 3px; }
  .cd { font-size: 10px; color: #888; line-height: 1.4; }
  .surprise-btn { width: 100%; padding: 13px; background: #fff; color: #002288; border: 1.5px dashed #002288; border-radius: 14px; font-size: 15px; cursor: pointer; margin-bottom: 10px; -webkit-tap-highlight-color: transparent; }
  .surprise-btn:active { background: #e8f0ff; }
  .obtn { width: 100%; padding: 16px; background: #002288; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 500; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity 0.2s; }
  .obtn:disabled { opacity: 0.35; cursor: default; }
  .obtn:active:not(:disabled) { opacity: 0.8; }
  .success { display: none; padding: 40px 20px; text-align: center; min-height: 60vh; flex-direction: column; align-items: center; justify-content: center; }
  .success.show { display: flex; }
  .sico { font-size: 56px; margin-bottom: 16px; }
  .success h2 { font-size: 22px; font-weight: 600; color: #002288; margin-bottom: 6px; }
  .success p { font-size: 14px; color: #888; }
  .id-badge { background: #002288; border-radius: 18px; padding: 18px 28px; margin: 18px 0; display: inline-block; }
  .id-badge .iname { font-size: 26px; font-weight: 600; color: #fff; }
  .id-badge .ick { font-size: 14px; color: rgba(255,255,255,0.75); margin-top: 6px; }
  .qnum-label { font-size: 13px; color: #888; margin-top: 8px; }
  .qnum { font-size: 64px; font-weight: 700; color: #002288; line-height: 1; margin: 6px 0 12px; }
  .back-btn { margin-top: 20px; padding: 12px 28px; border: 1.5px solid #002288; color: #002288; background: none; border-radius: 12px; cursor: pointer; font-size: 15px; -webkit-tap-highlight-color: transparent; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; margin-left: 6px; vertical-align: middle; }
  .conn-dot.on { background: #2a9d5c; }
  .conn-status { text-align: center; font-size: 11px; color: #aaa; padding: 8px; }
  @keyframes rollNames { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  .rolling { animation: rollNames 0.1s ease 4; }
</style>
</head>
<body>
<div class="header">
  <h1>ורמוטקון 🍸</h1>
  <p>ערב קוקטיילים | וִיתְקוֹן</p>
</div>
<div class="stripe"></div>
<div id="mainView">
  <div class="section">
    <div class="name-card">
      <div>
        <div class="name-label">הזהות שלך הערב</div>
        <div class="name-val" id="assignedName">לחץ להגרלה ←</div>
      </div>
      <button class="spin-btn" onclick="spinName()">🎲 הגרל</button>
    </div>
    <div class="hint">כל אורח מקבל זהות ישר
