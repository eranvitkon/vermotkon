<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ורמוטקון — ברמן</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; min-height: 100vh; direction: rtl; padding-bottom: 48px; }
  .header { background: #002288; padding: 16px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { color: #fff; font-size: 20px; font-weight: 600; }
  .live-badge { background: rgba(255,255,255,0.2); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #2aff7a; }
  .stripe { height: 5px; background: repeating-linear-gradient(to right, #002288 0, #002288 33%, #fff 33%, #fff 66%, #002288 66%, #002288 100%); }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 12px; }
  .stat { background: #fff; border-radius: 12px; padding: 12px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; color: #002288; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
  .orders-section { padding: 0 12px 12px; }
  .section-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 0 10px; }
  .section-title { font-size: 15px; font-weight: 600; color: #333; }
  .clear-btn { font-size: 12px; color: #888; background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 8px; cursor: pointer; }
  .order-item { background: #fff; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; transition: opacity 0.3s; }
  .order-item.done { opacity: 0.4; }
  .order-num { background: #002288; color: #fff; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .order-num.done-num { background: #bbb; }
  .order-info { flex: 1; }
  .order-name { font-size: 15px; font-weight: 600; color: #111; }
  .order-cocktail { font-size: 13px; color: #555; margin-top: 2px; }
  .order-time { font-size: 11px; color: #bbb; margin-top: 2px; }
  .done-btn { padding: 7px 14px; border: 1.5px solid #002288; color: #002288; background: none; border-radius: 10px; font-size: 13px; cursor: pointer; flex-shrink: 0; }
  .done-btn.completed { background: #002288; color: #fff; }
  .empty { text-align: center; padding: 48px 20px; color: #bbb; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .new-flash { animation: flash 0.6s ease; }
  @keyframes flash { 0%{background:#dce8ff} 100%{background:#fff} }
  .conn-bar { text-align: center; font-size: 11px; color: #aaa; padding: 8px; background: #f8f8f8; border-top: 0.5px solid #e0e0e0; position: fixed; bottom: 0; left: 0; right: 0; }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; display: inline-block; margin-left: 5px; vertical-align: middle; }
  .conn-dot.on { background: #2a9d5c; }
</style>
</head>
<body>
<div class="header">
  <h1>ורמוטקון 🍸 ברמן</h1>
  <div class="live-badge"><div class="live-dot"></div>חי</div>
</div>
<div class="stripe"></div>
<div class="stats">
  <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">סה״כ הזמנות</div></div>
  <div class="stat"><div class="stat-num" id="statPending">0</div><div class="stat-label">ממתינות</div></div>
  <div class="stat"><div class="stat-num" id="statDone">0</div><div class="stat-label">הוכנו</div></div>
</div>
<div class="orders-section">
  <div class="section-header">
    <span class="section-title">תור הזמנות</span>
    <button class="clear-btn" onclick="clearDone()">נקה הושלמו</button>
  </div>
  <div id="ordersList"></div>
</div>
<div class="conn-bar">
  <span class="conn-dot" id="dot"></span>
  <span id="connText">מתחבר...</span>
</div>
<script>
let orders = [], ws;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = () => { document.getElementById('dot').classList.add('on'); document.getElementById('connText').textContent = 'מחובר לשרת'; };
  ws.onclose = () => { document.getElementById('dot').classList.remove('on'); document.getElementById('connText').textContent = 'מנותק — מנסה שוב...'; setTimeout(connect, 3000); };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'init') { orders = msg.orders; render(); }
    if (msg.type === 'new_order') { orders.unshift(msg.order); render(msg.order.id); }
    if (msg.type === 'toggle_done') { const o = orders.find(x => x.id === msg.id); if (o) o.done = msg.done; render(); }
  };
}
function toggleDone(id) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'toggle_done', id })); }
function clearDone() { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'clear_done' })); }
function render(newId) {
  const pending = orders.filter(o => !o.done).length;
  const done = orders.filter(o => o.done).length;
  document.getElementById('statTotal').textContent = orders.length;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statDone').textContent = done;
  const el = document.getElementById('ordersList');
  if (!orders.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">🍸</div><p>אין הזמנות עדיין<br>ממתינים לאורחים...</p></div>'; return; }
  el.innerHTML = orders.map(o => `
    <div class="order-item ${o.done ? 'done' : ''} ${o.id === newId ? 'new-flash' : ''}">
      <div class="order-num ${o.done ? 'done-num' : ''}">${o.id}</div>
      <div class="order-info">
        <div class="order-name">${o.name}</div>
        <div class="order-cocktail">${o.cocktail.e} ${o.cocktail.n}</div>
        <div class="order-time">${o.time}</div>
      </div>
      <button class="done-btn ${o.done ? 'completed' : ''}" onclick="toggleDone(${o.id})">${o.done ? 'בוצע ✓' : 'סיים'}</button>
    </div>`).join('');
}
connect();
</script>
</body>
</html>
